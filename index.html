    <style>
      body {
        font-family: "Inter", sans-serif;
        transition:
          background-color 0.3s,
          color 0.3s;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #475569;
      }

      /* Checkbox styles */
      input[type="checkbox"] {
        accent-color: #2563eb;
        width: 1.2rem;
        height: 1.2rem;
        cursor: pointer;
        border-radius: 4px;
        transition: all 0.2s ease;
      }

      .progress-bar-fill {
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .accordion-content {
        display: none;
      }
      .accordion-content.open {
        display: block;
        animation: fadeIn 0.3s ease;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .rotate-180 {
        transform: rotate(180deg);
      }
    </style>

                { id: "d10-t5-s4", title: "Matriz de planejamento." },
              ],
            },
            {
              id: "d10-t6",
              title: "Execução da auditoria.",
              subtopics: [
                { id: "d10-t6-s1", title: "Programas de auditoria." },
                { id: "d10-t6-s2", title: "Papéis de trabalho." },
                { id: "d10-t6-s3", title: "Testes de auditoria." },
                { id: "d10-t6-s4", title: "Técnicas e procedimentos: exame documental, inspeção, cálculos, entrevistas, circularização, revisão." },
              ],
            },
            {
              id: "d10-t7",
              title: "Evidências.",
              subtopics: [
                { id: "d10-t7-s1", title: "Caracterização de achados de auditoria." },
                { id: "d10-t7-s2", title: "Matriz de achados e matriz de responsabilização." },
              ],
            },
            { id: "d10-t8", title: "Comunicação dos resultados: relatórios de auditoria." },
            { id: "d10-t9", title: "Monitoramento." },
          ],
        },
      ];

      let checkboxState = JSON.parse(localStorage.getItem("edital-tracker-progress")) || {};
      let flatMap = {};

      function autoGenerateURLs() {
        editalData.forEach((disc, dIdx) => {
          delete disc.url; // A disciplina pai não tem URL nem link
          const pasta = dIdx + 1;

          disc.topics.forEach((top, tIdx) => {
            // URL: pasta/topico.html (Ex: 1/1.html)
            if (!top.url) top.url = `${pasta}/${tIdx + 1}.html`;

            if (top.subtopics) {
              top.subtopics.forEach((sub, sIdx) => {
                // URL: pasta/topico-subtopico.html (Ex: 1/1-1.html)
                if (!sub.url) sub.url = `${pasta}/${tIdx + 1}-${sIdx + 1}.html`;
              });
            }
          });
        });
      }

      function buildMap() {
        editalData.forEach((disc) => {
          flatMap[disc.id] = { id: disc.id, type: "disc", data: disc, parent: null, children: disc.topics.map((t) => t.id), leafCount: 0 };
          let discLeafCount = 0;

          disc.topics.forEach((top) => {
            flatMap[top.id] = {
              id: top.id,
              type: "top",
              data: top,
              parent: disc.id,
              children: top.subtopics ? top.subtopics.map((s) => s.id) : [],
              leafCount: 0,
            };

            if (top.subtopics && top.subtopics.length > 0) {
              top.subtopics.forEach((sub) => {
                flatMap[sub.id] = { id: sub.id, type: "sub", data: sub, parent: top.id, children: [], leafCount: 1 };
              });
              flatMap[top.id].leafCount = top.subtopics.length;
              discLeafCount += top.subtopics.length;
            } else {
              flatMap[top.id].leafCount = 1;
              discLeafCount += 1;
            }
          });
          flatMap[disc.id].leafCount = discLeafCount;
        });
      }

      function toggleNode(id, isChecked) {
        checkboxState[id] = isChecked;
        propagateDown(id, isChecked);
        propagateUp(flatMap[id].parent);
        saveState();
        updateDOM();
      }

      function propagateDown(id, isChecked) {
        const node = flatMap[id];
        if (!node.children || node.children.length === 0) return;

        node.children.forEach((childId) => {
          checkboxState[childId] = isChecked;
          propagateDown(childId, isChecked);
        });
      }

      function propagateUp(parentId) {
        if (!parentId) return;
        const parentNode = flatMap[parentId];

        const allChildrenChecked = parentNode.children.every((childId) => checkboxState[childId]);
        const someChildrenChecked = parentNode.children.some((childId) => checkboxState[childId]);

        checkboxState[parentId] = allChildrenChecked;

        const cb = document.getElementById(`cb-${parentId}`);
        if (cb) {
          cb.checked = allChildrenChecked;
          cb.indeterminate = !allChildrenChecked && someChildrenChecked;
        }

        propagateUp(parentNode.parent);
      }

      function saveState() {
        localStorage.setItem("edital-tracker-progress", JSON.stringify(checkboxState));
      }

      function renderUI() {
        const container = document.getElementById("edital-container");
        container.innerHTML = "";

        const linkIcon = (url) =>
          url
            ? `<svg class="w-3.5 h-3.5 inline-block ml-1.5 opacity-60 hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>`
            : "";

        editalData.forEach((disc, dIdx) => {
          const discCard = document.createElement("div");
          discCard.className = "bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden";

          // HTML da Disciplina (Sem Checkbox, sem link, sem número)
          let html = `
                    <div class="p-4 md:p-5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors cursor-pointer" onclick="toggleAccordion('${disc.id}')">
                        <div class="flex items-center gap-3 w-full md:w-auto">
                            <span class="font-bold text-slate-800 dark:text-white select-none text-base md:text-lg transition-colors flex items-center">${disc.title}</span>
                        </div>
                        
                        <div class="flex items-center gap-4 w-full md:w-64">
                            <div class="flex-1">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-xs text-slate-500 dark:text-slate-400 font-medium">Progresso</span>
                                    <span id="pct-${disc.id}" class="text-xs font-bold text-primary-600 dark:text-primary-400">0%</span>
                                </div>
                                <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2">
                                    <div id="bar-${disc.id}" class="bg-primary-500 h-2 rounded-full progress-bar-fill" style="width: 0%"></div>
                                </div>
                            </div>
                            <button class="p-1 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-transform duration-200" id="icon-${disc.id}">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div id="content-${disc.id}" class="accordion-content border-t border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50">
                        <div class="p-4 md:p-6 space-y-5">
                `;

          disc.topics.forEach((top, tIdx) => {
            html += `
                        <div class="topic-group">
                            <div class="flex items-start gap-3 mb-2">
                                <input type="checkbox" id="cb-${top.id}" class="mt-1" onchange="toggleNode('${top.id}', this.checked)">
                                <a href="${top.url || "#"}" id="link-${top.id}" target="_blank" class="font-semibold text-sm md:text-base text-slate-700 dark:text-slate-200 hover:text-primary-600 dark:hover:text-primary-400 hover:underline cursor-pointer select-none leading-tight transition-colors flex items-center">${tIdx + 1}. ${top.title} ${linkIcon(top.url)}</a>
                            </div>
                    `;

            if (top.subtopics && top.subtopics.length > 0) {
              html += `<div class="ml-7 pl-4 border-l-2 border-slate-200 dark:border-slate-600 space-y-2.5 mt-2">`;
              top.subtopics.forEach((sub, sIdx) => {
                html += `
                                <div class="flex items-start gap-3">
                                    <input type="checkbox" id="cb-${sub.id}" class="mt-0.5 w-4 h-4" onchange="toggleNode('${sub.id}', this.checked)">
                                    <a href="${sub.url}" id="link-${sub.id}" target="_blank" class="text-sm text-slate-600 dark:text-slate-400 hover:text-primary-600 dark:hover:text-primary-400 hover:underline cursor-pointer select-none leading-tight transition-colors flex items-center">${tIdx + 1}.${sIdx + 1}. ${sub.title} ${linkIcon(sub.url)}</a>
                                </div>
                            `;
              });
              html += `</div>`;
            }
            html += `</div>`;
          });

          html += `</div></div>`;
          discCard.innerHTML = html;
          container.appendChild(discCard);
        });
      }

      function updateDOM() {
        let totalLeaves = 0;
        let checkedLeaves = 0;

        Object.keys(flatMap).forEach((id) => {
          const node = flatMap[id];
          const cb = document.getElementById(`cb-${id}`);

          if (cb) {
            cb.checked = !!checkboxState[id];
            if (node.children && node.children.length > 0) {
              const all = node.children.every((c) => checkboxState[c]);
              const some = node.children.some((c) => isNodeOrDescendantChecked(c));
              cb.indeterminate = !all && some;
            }
          }

          if (node.type === "disc") {
            let discTotal = node.leafCount;
            let discChecked = countCheckedLeaves(node);
            let pct = discTotal > 0 ? Math.round((discChecked / discTotal) * 100) : 0;

            document.getElementById(`pct-${id}`).innerText = `${pct}%`;
            document.getElementById(`bar-${id}`).style.width = `${pct}%`;

            totalLeaves += discTotal;
            checkedLeaves += discChecked;
          }
        });

        let overallPct = totalLeaves > 0 ? Math.round((checkedLeaves / totalLeaves) * 100) : 0;
        document.getElementById("overall-percentage").innerText = `${overallPct}%`;
        document.getElementById("overall-progress-bar").style.width = `${overallPct}%`;
      }

      function isNodeOrDescendantChecked(id) {
        if (checkboxState[id]) return true;
        const node = flatMap[id];
        if (!node.children) return false;
        return node.children.some((c) => isNodeOrDescendantChecked(c));
      }

      function countCheckedLeaves(node) {
        if (!node.children || node.children.length === 0) {
          return checkboxState[node.id] ? 1 : 0;
        }
        return node.children.reduce((sum, childId) => sum + countCheckedLeaves(flatMap[childId]), 0);
      }

      function toggleAccordion(id) {
        const content = document.getElementById(`content-${id}`);
        const icon = document.getElementById(`icon-${id}`);

        if (content.classList.contains("open")) {
          content.classList.remove("open");
          icon.classList.remove("rotate-180");
        } else {
          content.classList.add("open");
          icon.classList.add("rotate-180");
        }
      }

      let isExpanded = false;
      document.getElementById("expand-all").addEventListener("click", (e) => {
        isExpanded = !isExpanded;
        e.target.innerText = isExpanded ? "Recolher tudo" : "Expandir tudo";

        editalData.forEach((disc) => {
          const content = document.getElementById(`content-${disc.id}`);
          const icon = document.getElementById(`icon-${disc.id}`);
          if (isExpanded) {
            content.classList.add("open");
            icon.classList.add("rotate-180");
          } else {
            content.classList.remove("open");
            icon.classList.remove("rotate-180");
          }
        });
      });

      // Configuração do Modal
      const confirmModal = document.getElementById("confirm-modal");
      const confirmModalBox = document.getElementById("confirm-modal-box");

      document.getElementById("reset-btn").addEventListener("click", () => {
        confirmModal.classList.remove("hidden");
        confirmModal.classList.add("flex");
        setTimeout(() => {
          confirmModal.classList.remove("opacity-0");
          confirmModalBox.classList.remove("scale-95");
        }, 10);
      });

      document.getElementById("modal-cancel").addEventListener("click", () => {
        closeModal();
      });

      document.getElementById("modal-confirm").addEventListener("click", () => {
        checkboxState = {};
        saveState();
        updateDOM();
        closeModal();
      });

      function closeModal() {
        confirmModal.classList.add("opacity-0");
        confirmModalBox.classList.add("scale-95");
        setTimeout(() => {
          confirmModal.classList.remove("flex");
          confirmModal.classList.add("hidden");
        }, 300);
      }

      const themeToggleBtn = document.getElementById("theme-toggle");
      const darkIcon = document.getElementById("theme-toggle-dark-icon");
      const lightIcon = document.getElementById("theme-toggle-light-icon");

      function initTheme() {
        if (
          localStorage.getItem("edital-tracker-theme") === "dark" ||
          (!("edital-tracker-theme" in localStorage) && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
          lightIcon.classList.remove("hidden");
        } else {
          document.documentElement.classList.remove("dark");
          darkIcon.classList.remove("hidden");
        }
      }

      themeToggleBtn.addEventListener("click", function () {
        darkIcon.classList.toggle("hidden");
        lightIcon.classList.toggle("hidden");

        if (document.documentElement.classList.contains("dark")) {
          document.documentElement.classList.remove("dark");
          localStorage.setItem("edital-tracker-theme", "light");
        } else {
          document.documentElement.classList.add("dark");
          localStorage.setItem("edital-tracker-theme", "dark");
        }
      });

      function init() {
        autoGenerateURLs();
        buildMap();
        renderUI();

        editalData.forEach((disc) => {
          disc.topics.forEach((top) => {
            if (top.subtopics) propagateUp(top.id);
          });
          propagateUp(disc.id);
        });

        updateDOM();
        initTheme();
      }

      init();
    </script>
